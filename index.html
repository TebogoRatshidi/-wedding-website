<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Website</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        nav { background-color: #333; color: #fff; padding: 15px; }
        nav a { color: #fff; margin: 0 15px; text-decoration: none; }
        section { padding: 20px; }
        #seatingFind { display: none; }
    </style>
    <script>
        function findSeating() {
            const name = document.getElementById('guestName').value;
            const seatingChart = {
                'Alice': 'Table 1',
                'Bob': 'Table 2',
                'Charlie': 'Table 3'
            };
            const result = seatingChart[name] || 'Not Found';
            document.getElementById('seatingResult').innerText = result;
            document.getElementById('seatingFind').style.display = 'block';
        }
    </script>
</head>
<body>
    <nav>
        <a href="#about">About Us</a>
        <a href="#menu">Menu</a>
        <a href="#seating">Seating Finder</a>
    </nav>
    <section id="about">
        <h2>About Us</h2>
        <p>Once upon a time, there were two souls destined to be together...</p>
    </section>
    <section id="menu">
        <h2>Menu</h2>
        <ul>
            <li>Appetizer: Spring Rolls</li>
            <li>Main Course: Grilled Salmon</li>
            <li>Dessert: Chocolate Cake</li>
        </ul>
    </section>
    <section id="seating">
        <h2>Seating Finder</h2>
        <input type="text" id="guestName" placeholder="Enter your name"/>
        <button onclick="findSeating()">Find Seating</button>
        <div id="seatingFind">
            <p>Your seating is: <span id="seatingResult"></span></p>
        </div>
    </section>
</body>
</html>
